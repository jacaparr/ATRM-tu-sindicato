<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico IA - ATRM</title>
  <style>
    body { font-family: system-ui; max-width: 1000px; margin: 20px auto; padding: 20px; }
    .test { background: #f5f5f5; padding: 15px; border-radius: 8px; margin: 15px 0; }
    .pregunta { font-weight: bold; color: #0066cc; margin-bottom: 10px; }
    .resultado { background: white; padding: 10px; margin-top: 10px; border-left: 4px solid #ddd; }
    .debug { font-family: monospace; font-size: 11px; color: #666; margin-top: 5px; background: #f9f9f9; padding: 5px; }
    button { background: #FF6B35; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🔍 Diagnóstico IA - ATRM</h1>
  <button onclick="diagnosticar()">Ejecutar Diagnóstico</button>
  <link rel="stylesheet" href="css/professional-theme.css">
  <div id="resultados"></div>

  <script src="js/ia_mejorada.js"></script>
  <script>
    async function diagnosticar() {
      const ia = new IAContextual();
      const resultados = document.getElementById('resultados');
      resultados.innerHTML = '<p>⏳ Cargando base de casos...</p>';
      
      // Esperar a que cargue la base de casos
      const cargado = await ia.esperarCasos();
      
      if (!cargado) {
        resultados.innerHTML = '<div style="color:red; padding:20px;">❌ ERROR: No se pudo cargar la base de casos después de 3 segundos</div>';
        return;
      }
      
      resultados.innerHTML = '<p>✅ Base cargada. Ejecutando diagnóstico...</p>';
      
      const preguntas = [
        'días por fallecimiento de suegra',
        'ha muerto mi padre',
        'plus de nocturnidad',
        'cuántos días de vacaciones tengo',
        'mi madre está ingresada'
      ];
      
      let html = '';
      
      for (const pregunta of preguntas) {
        html += `<div class="test">`;
        html += `<div class="pregunta">Pregunta: "${pregunta}"</div>`;
        
        // Buscar caso directamente
        const caso = ia.encontrarCaso(pregunta);
        
        if (!caso) {
          html += `<div class="resultado" style="border-color:#f44336">❌ NO SE ENCONTRÓ CASO</div>`;
          html += `<div class="debug">Base de casos cargada: ${ia.baseCasos ? 'SÍ' : 'NO'}</div>`;
          html += `<div class="debug">Número de casos: ${ia.baseCasos?.casos ? Object.keys(ia.baseCasos.casos).length : 0}</div>`;
        } else {
          html += `<div class="resultado" style="border-color:#4CAF50">✅ Caso encontrado: ${caso.titulo}</div>`;
          html += `<div class="debug">ID: ${caso.id || 'N/A'} | Score: ${caso._score || 'N/A'}</div>`;
          html += `<div class="debug">Keywords del caso: ${(caso.keywords || []).slice(0, 10).join(', ')}${caso.keywords?.length > 10 ? '...' : ''}</div>`;
        }
        
        // Probar respuesta completa
        const respuesta = await ia.generarRespuesta(pregunta);
        html += `<div class="debug">Respuesta (primeros 200 chars): ${respuesta.substring(0, 200)}...</div>`;
        
        html += `</div>`;
        
        await new Promise(resolve => setTimeout(resolve, 300));
      }

      // Diagnóstico masivo por keywords
      const casos = ia.baseCasos?.casos || {};
      const mismatches = [];
      const ambiguos = [];
      const sinArticulo = [];

      Object.entries(casos).forEach(([id, caso]) => {
        const detalle = String(caso.detalle || '');
        if (!/(art\.|artículo)\s*\d+/i.test(detalle)) {
          sinArticulo.push({ id, titulo: caso.titulo || id });
        }

        const keywords = (caso.keywords || []).slice(0, 3);
        keywords.forEach((kw) => {
          const encontrado = ia.encontrarCaso(kw);
          if (!encontrado || encontrado.id !== id) {
            mismatches.push({
              keyword: kw,
              esperado: id,
              encontrado: encontrado?.id || 'N/A'
            });
            return;
          }

          const top = ia.ultimosResultados || [];
          if (top.length > 1) {
            const diff = top[0].score - top[1].score;
            if (diff < 2) {
              ambiguos.push({
                keyword: kw,
                principal: `${top[0].id} (${top[0].score})`,
                alternativo: `${top[1].id} (${top[1].score})`
              });
            }
          }
        });
      });

      html += `<div class="test">`;
      html += `<h3>🧪 Diagnóstico por keywords</h3>`;
      html += `<div class="debug">Total casos: ${Object.keys(casos).length}</div>`;
      html += `<div class="debug">Mismatches: ${mismatches.length}</div>`;
      html += `<div class="debug">Ambiguos (score cercano): ${ambiguos.length}</div>`;
      html += `<div class="debug">Sin referencia a artículo: ${sinArticulo.length}</div>`;
      html += `</div>`;

      if (mismatches.length) {
        html += `<div class="test"><h3>❌ Mismatches (primeros 20)</h3>`;
        mismatches.slice(0, 20).forEach(m => {
          html += `<div class="debug">Keyword "${m.keyword}" → esperado: ${m.esperado} | encontrado: ${m.encontrado}</div>`;
        });
        html += `</div>`;
      }

      if (ambiguos.length) {
        html += `<div class="test"><h3>⚠️ Ambiguos (primeros 20)</h3>`;
        ambiguos.slice(0, 20).forEach(a => {
          html += `<div class="debug">Keyword "${a.keyword}" → ${a.principal} vs ${a.alternativo}</div>`;
        });
        html += `</div>`;
      }

      if (sinArticulo.length) {
        html += `<div class="test"><h3>📌 Sin artículo (primeros 20)</h3>`;
        sinArticulo.slice(0, 20).forEach(s => {
          html += `<div class="debug">${s.id} — ${s.titulo}</div>`;
        });
        html += `</div>`;
      }
      
      // Info adicional
      html += `<div class="test">`;
      html += `<h3>📊 Información del Sistema</h3>`;
      html += `<div class="debug">Base de casos cargada: ${ia.baseCasos ? 'SÍ' : 'NO'}</div>`;
      if (ia.baseCasos?.casos) {
        html += `<div class="debug">Casos disponibles: ${Object.keys(ia.baseCasos.casos).length}</div>`;
        html += `<div class="debug">Lista de IDs: ${Object.keys(ia.baseCasos.casos).join(', ')}</div>`;
      }
      html += `</div>`;
      
      resultados.innerHTML = html;
    }
    
    // Diagnóstico automático al cargar
    window.addEventListener('load', () => {
      setTimeout(diagnosticar, 1000);
    });
  </script>
</body>
</html>
